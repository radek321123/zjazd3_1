<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
</head>
<body>
<div id="root">

</div>
<script type="module">

    const FILMS = [
        { id: 1, title: 'Oppenheimer',       year: 2023, genre: 'Dramat',  rating: 5, watched: true  },
        { id: 2, title: 'Dune: Część druga', year: 2024, genre: 'Sci-Fi',  rating: 4, watched: false },
        { id: 3, title: 'Past Lives',        year: 2023, genre: 'Romans',  rating: 5, watched: true  },
        { id: 4, title: 'Poor Things',       year: 2023, genre: 'Komedia', rating: 4, watched: false },
    ];



    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement("div", {className: "App"}, [
    React.createElement("h1", {} ,"🎬 Biblioteka Filmów"),
            FILMS.map(film =>
                React.createElement(FilmCard, {
                    key: film.id,
                    title: film.title,
                    year: film.year,
                    genre: film.genre,
                    rating: film.rating,
                    watched: film.watched
                })
            )
        ]
    ))

    function FilmCard({ title, year, genre, rating, watched }) {
        let Card = React.createElement("div", {}, [
            React.createElement("h3", {}, `Title: ${title}, Year: ${year}`),
            React.createElement("span", {}, `Genre: ${genre}`),
            React.createElement(RatingStars, {rating: rating}, ""),
            watched ? React.createElement("p", {}, "✓ Obejrzany") : null
            ])
        return (Card)


    }

    function RatingStars({ rating }) {
        const stars = '★★★★★☆☆☆☆☆'
        let starComp = React.createElement("span", {className: "Rating"}, stars.slice(5-rating, 10-rating))
        console.log(starComp)
        console.log([starComp.$$typeof, starComp.type, starComp.props])
        return (starComp)
    }

    console.log(React.createElement(FilmCard, { title: 'Test', year: 2024, genre: 'Dramat', rating: 3, watched: false }))
</script>
</body>
</html>
